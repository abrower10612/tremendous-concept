# Local development and test use SQLite (zero-config, no server needed).
# Production uses PostgreSQL via DATABASE_URL (provided by Railway).

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: sqlite3
  timeout: 5000
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
test:
  <<: *default
  adapter: sqlite3
  timeout: 5000
  database: storage/test.sqlite3

production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
